<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRD 生成器</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav class="nav"><div class="container">
  <span class="brand"><span class="dot"></span><span data-i18n="brand">PRD 生成器</span></span>
  <span class="spacer"></span>
  <a class="navlink" href="index.html" data-i18n="back">← 工具集</a>
  <button id="langBtn" class="langbtn" type="button" aria-label="切换到英文 / Switch to English">EN</button>
</div></nav>
<div class="tool-head"><div class="container">
  <h1>📄 <span data-i18n="th">PRD 生成器</span> <span class="skeleton-badge" data-i18n="badge">骨架版</span></h1>
  <p data-i18n="sub">依据《PRD写作指导.md》9 章框架 + 语言规范；风格层：通用 / 阿里 / 腾讯</p>
</div></div>
<main class="container"><div id="app"></div></main>
<footer><div class="container" data-i18n="foot">© 陈颖妍 · 骨架代码 · 校验规则来自 PRD写作指导.md 第 3 节</div></footer>

<script src="assets/wizard.js"></script>
<script>
var T = {
  generic:{zh:'通用',en:'Generic'}, ali:{zh:'阿里（业务闭环+数据指标）',en:'Alibaba (business loop + data metrics)'}, tencent:{zh:'腾讯（体验交互+性能细节）',en:'Tencent (experience/interaction + performance detail)'},
  full:{zh:'全量',en:'Full rollout'}, gray:{zh:'灰度',en:'Gradual (canary)'},
  cl1:{zh:'目标可量化',en:'Goals measurable'}, cl2:{zh:'写了不做什么',en:'Out-of-scope stated'}, cl3:{zh:'每功能有验收',en:'Each feature has acceptance'}, cl4:{zh:'覆盖边界异常',en:'Edge cases covered'}, cl5:{zh:'有回滚预案',en:'Rollback plan'}, cl6:{zh:'术语一致',en:'Consistent terms'}
};
function o(v){ return {v:v, zh:T[v].zh, en:T[v].en}; }
function lbl(v,lang){ return T[v] ? (T[v][lang]||T[v].zh) : v; }

function chkQuant(v){ if(!v)return null; if(/(提升|优化|改善|更好|增强|加强)/.test(v) && !/\d/.test(v)) return {level:'warn',msg:{zh:'目标含“提升/优化”等词但无数字——目标需可量化，如“7 日留存 +5%”。',en:'Goal uses words like "improve/optimize" but no number — goals must be measurable, e.g., "+5% 7-day retention".'}}; return null; }
function chkAdj(v){ if(!v)return null; if(/(快速|流畅|友好|美观|大量|很多)/.test(v)&&!/\d/.test(v)) return {level:'tip',msg:{zh:'含主观形容词，建议改成可测的数字或行为。',en:'Contains subjective adjectives; replace with measurable numbers or behaviors.'}}; return null; }

var cfg={ key:'prd', apiBase:'https://yingyan-chen-ai-portfolio.vercel.app', steps:[
  { title:{zh:'文档信息',en:'Document info'}, intro:{zh:'第 0 章：基本信息 + 选择风格层。',en:'Chapter 0: basic info + choose a style preset.'}, fields:[
     {name:'name', label:{zh:'产品/需求名',en:'Product / feature name'}, type:'text', placeholder:{zh:'例：新用户注册引导优化',en:'e.g., New-user onboarding optimization'}},
     {name:'author', label:{zh:'作者 / 版本',en:'Author / version'}, type:'text', placeholder:{zh:'陈颖妍 / v0.1',en:'Yingyan Chen / v0.1'}},
     {name:'style', label:{zh:'风格层',en:'Style preset'}, hint:{zh:'影响措辞侧重',en:'Affects wording emphasis'}, type:'radio', options:[o('generic'),o('ali'),o('tencent')]}
  ]},
  { title:{zh:'项目概述',en:'Overview'}, intro:{zh:'第 1 章：背景、目标（可量化）、非目标、北极星指标、参与人。',en:'Chapter 1: background, goal (measurable), non-goals, north-star metric, stakeholders.'}, fields:[
     {name:'bg', label:{zh:'背景（为何做，1–3 句）',en:'Background (why, 1–3 sentences)'}, type:'textarea'},
     {name:'goal', label:{zh:'目标（必须可量化）',en:'Goal (must be measurable)'}, type:'textarea', placeholder:{zh:'例：30 日内注册转化率从 40% 提升到 50%',en:'e.g., raise 30-day signup conversion from 40% to 50%'}, check:chkQuant},
     {name:'nongoal', label:{zh:'非目标（不解决什么）',en:'Non-goals (what it won’t solve)'}, type:'text',
        check:function(v){ if(!v) return {level:'tip',msg:{zh:'建议写明“不做什么”，避免范围蔓延。',en:'State what you won’t do, to avoid scope creep.'}}; return null; }},
     {name:'metric', label:{zh:'北极星 / 上线后评估指标',en:'North-star / post-launch metric'}, type:'text'},
     {name:'people', label:{zh:'参与人',en:'Stakeholders'}, type:'text', placeholder:{zh:'产品/设计/前端/后端/测试',en:'PM / design / frontend / backend / QA'}}
  ]},
  { title:{zh:'需求范围',en:'Scope'}, intro:{zh:'第 2 章：做什么 / 不做什么 / 依赖假设。',en:'Chapter 2: in scope / out of scope / dependencies & assumptions.'}, fields:[
     {name:'in', label:{zh:'本期做（In Scope）',en:'In scope'}, type:'lines'},
     {name:'out', label:{zh:'本期不做（Out of Scope）',en:'Out of scope'}, type:'lines',
        check:function(v){ if(!v) return {level:'tip',msg:{zh:'未写边界，易范围蔓延。',en:'No boundary stated — scope creep risk.'}}; return null; }},
     {name:'dep', label:{zh:'依赖与假设',en:'Dependencies & assumptions'}, type:'textarea'}
  ]},
  { title:{zh:'用户与场景',en:'Users & scenarios'}, intro:{zh:'第 3 章：画像、角色权限、用户故事。',en:'Chapter 3: personas, roles/permissions, user stories.'}, fields:[
     {name:'persona', label:{zh:'目标用户画像',en:'Target user persona'}, type:'textarea'},
     {name:'story', label:{zh:'用户故事',en:'User stories'}, hint:{zh:'作为__，我想要__，以便__',en:'As a __, I want __, so that __'}, type:'lines', placeholder:{zh:'作为新用户，我想要一键第三方登录，以便快速完成注册',en:'As a new user, I want one-tap third-party login, so that I can finish signup quickly'},
        check:function(v){ if(v && !/以便|以此|从而|so that/i.test(v)) return {level:'tip',msg:{zh:'用户故事建议补上“以便<价值>”。',en:'Add "so that <value>" to the user story.'}}; return null; }}
  ]},
  { title:{zh:'功能需求',en:'Functional requirements'}, intro:{zh:'第 4 章（主体）：每个功能都要有验收标准与边界异常。',en:'Chapter 4 (core): every feature needs acceptance criteria and edge cases.'}, fields:[
     {name:'flist', label:{zh:'功能清单（每行：功能名 | 优先级P0/P1/P2）',en:'Feature list (per line: name | priority P0/P1/P2)'}, type:'lines', placeholder:{zh:'第三方一键登录 | P0\n注册进度保存 | P1',en:'One-tap third-party login | P0\nSave signup progress | P1'}},
     {name:'fdetail', label:{zh:'某功能详述（描述/流程/字段/边界异常/验收标准）',en:'One feature in detail (description/flow/fields/edge cases/acceptance)'}, type:'textarea', placeholder:{zh:'功能：第三方一键登录\n流程：点击→授权→回调建账号→进首页\n边界：授权失败/网络失败/已存在账号→…\n验收：授权成功后 3s 内进首页，失败有明确提示',en:'Feature: one-tap third-party login\nFlow: tap → authorize → callback creates account → home\nEdge: auth fail / network fail / account exists → …\nAcceptance: home within 3s of auth success; clear error on failure'},
        check:function(v){ if(!v)return null; var missZh=[],missEn=[]; if(!/验收|accept/i.test(v)){missZh.push('验收标准');missEn.push('acceptance criteria');} if(!/边界|异常|失败|edge|fail/i.test(v)){missZh.push('边界异常');missEn.push('edge cases');} return missZh.length?{level:'warn',msg:{zh:'该功能缺：'+missZh.join('、')+'（不写会导致“无法判定完成/上线即崩”）。',en:'This feature is missing: '+missEn.join(', ')+' (omitting these means "can’t tell when it’s done / it breaks on launch").'}}:{level:'ok',msg:{zh:'已含验收与边界，良好。',en:'Includes acceptance and edge cases — good.'}}; }}
  ]},
  { title:{zh:'非功能需求',en:'Non-functional'}, intro:{zh:'第 5 章：性能（给数字）、安全、兼容、合规。',en:'Chapter 5: performance (give numbers), security, compatibility, compliance.'}, fields:[
     {name:'perf', label:{zh:'性能（给数字）',en:'Performance (give numbers)'}, type:'text', placeholder:{zh:'列表首屏<1s；支持 1000 并发',en:'List first paint <1s; supports 1000 concurrent'}, check:chkAdj},
     {name:'sec', label:{zh:'安全 / 合规',en:'Security / compliance'}, type:'text'},
     {name:'compat', label:{zh:'兼容性',en:'Compatibility'}, type:'text'}
  ]},
  { title:{zh:'数据与埋点',en:'Data & tracking'}, intro:{zh:'第 6 章：指标定义 + 埋点方案。',en:'Chapter 6: metric definitions + event-tracking plan.'}, fields:[
     {name:'track', label:{zh:'埋点（事件名/触发时机/上报字段）',en:'Tracking (event / trigger / fields)'}, type:'lines', placeholder:{zh:'register_success | 注册成功 | user_id,channel',en:'register_success | on signup complete | user_id,channel'}},
     {name:'eval', label:{zh:'如何评估目标达成',en:'How goal achievement is evaluated'}, type:'text'}
  ]},
  { title:{zh:'发布与里程碑',en:'Release & milestones'}, intro:{zh:'第 7 章：排期、灰度、回滚。',en:'Chapter 7: schedule, canary, rollback.'}, fields:[
     {name:'plan', label:{zh:'排期 / 里程碑',en:'Schedule / milestones'}, type:'text'},
     {name:'release', label:{zh:'发布策略',en:'Release strategy'}, type:'radio', options:[o('full'),o('gray')]},
     {name:'rollback', label:{zh:'回滚策略',en:'Rollback plan'}, type:'text',
        check:function(v){ if(!v) return {level:'tip',msg:{zh:'缺回滚预案（验收+数据+回滚=闭环）。',en:'No rollback plan (acceptance + data + rollback = a closed loop).'}}; return null; }}
  ]},
  { title:{zh:'附录 & 终审',en:'Appendix & review'}, intro:{zh:'第 8 章：术语 / TBD。完成后导出，并对照自检清单。',en:'Chapter 8: glossary / TBD. Export when done, and check against the self-review list.'}, fields:[
     {name:'tbd', label:{zh:'待定项 TBD（内容 @负责人 截止）',en:'TBD items (content @owner deadline)'}, type:'lines'},
     {name:'checklist', label:{zh:'自检清单',en:'Self-review checklist'}, type:'checks', options:[o('cl1'),o('cl2'),o('cl3'),o('cl4'),o('cl5'),o('cl6')]},
     {name:'_note', type:'static', html:{zh:'<div class="callout">右侧实时生成 PRD 预览，点“导出 .md”。配置 apiBase 后可启用“一键规范表述”。</div>',en:'<div class="callout">A live PRD preview builds on the right; click "Export .md". Once apiBase is set, "one-click wording cleanup" is enabled.</div>'}}
  ]}
],
buildPreview:function(s,lang){
  function P(zh,en){ return lang==='en'?en:zh; }
  var C = lang==='en'?': ':'：', DOT = lang==='en'?', ':'、';
  var styleLabel = s.style ? lbl(s.style,lang) : P('通用','Generic');
  var o=['# '+(s.name||P('《未命名》','Untitled'))+P(' — 产品需求文档 PRD',' — Product Requirements Document (PRD)'),''];
  o.push('_'+P('作者/版本','Author/version')+C+(s.author||'—')+' · '+P('风格','Style')+C+styleLabel+'_','');
  o.push('## 1. '+P('项目概述','Overview'));
  if(s.bg)o.push('**'+P('背景','Background')+'**'+C+s.bg);
  if(s.goal)o.push('**'+P('目标','Goal')+'**'+C+s.goal);
  if(s.nongoal)o.push('**'+P('非目标','Non-goals')+'**'+C+s.nongoal);
  if(s.metric)o.push('**'+P('指标','Metric')+'**'+C+s.metric);
  if(s.people)o.push('**'+P('参与人','Stakeholders')+'**'+C+s.people);
  o.push(''); o.push('## 2. '+P('需求范围','Scope'));
  if(s.in){o.push('**In Scope**'+C);s.in.split('\n').forEach(function(x){if(x.trim())o.push('- '+x);});}
  if(s.out){o.push('**Out of Scope**'+C);s.out.split('\n').forEach(function(x){if(x.trim())o.push('- '+x);});}
  if(s.dep)o.push('**'+P('依赖与假设','Dependencies & assumptions')+'**'+C+s.dep);
  o.push(''); o.push('## 3. '+P('用户与场景','Users & scenarios')); if(s.persona)o.push(s.persona);
  if(s.story){o.push('**'+P('用户故事','User stories')+'**'+C);s.story.split('\n').forEach(function(x){if(x.trim())o.push('- '+x);});}
  o.push(''); o.push('## 4. '+P('功能需求','Functional requirements'));
  if(s.flist){o.push('| '+P('功能','Feature')+' | '+P('优先级','Priority')+' |','|---|---|');s.flist.split('\n').forEach(function(x){var p=x.split('|');if(p[0]&&p[0].trim())o.push('| '+(p[0]||'').trim()+' | '+((p[1]||'').trim()||'-')+' |');});}
  if(s.fdetail){o.push('');o.push('**'+P('功能详述','Feature detail')+'**'+C);o.push('```');o.push(s.fdetail);o.push('```');}
  o.push(''); o.push('## 5. '+P('非功能需求','Non-functional'));
  if(s.perf)o.push('**'+P('性能','Performance')+'**'+C+s.perf); if(s.sec)o.push('**'+P('安全/合规','Security/compliance')+'**'+C+s.sec); if(s.compat)o.push('**'+P('兼容','Compatibility')+'**'+C+s.compat);
  o.push(''); o.push('## 6. '+P('数据与埋点','Data & tracking')); if(s.track)s.track.split('\n').forEach(function(x){if(x.trim())o.push('- '+x);}); if(s.eval)o.push('**'+P('评估','Evaluation')+'**'+C+s.eval);
  o.push(''); o.push('## 7. '+P('发布与里程碑','Release & milestones')); if(s.plan)o.push('**'+P('排期','Schedule')+'**'+C+s.plan); if(s.release)o.push('**'+P('发布','Release')+'**'+C+lbl(s.release,lang)); if(s.rollback)o.push('**'+P('回滚','Rollback')+'**'+C+s.rollback);
  o.push(''); o.push('## 8. '+P('附录','Appendix')); if(s.tbd)s.tbd.split('\n').forEach(function(x){if(x.trim())o.push('- TBD'+C+x);});
  if(s.checklist)o.push('','**'+P('自检通过','Checklist passed')+'**'+C+s.checklist.map(function(x){return lbl(x,lang);}).join(DOT));
  return o.join('\n');
}};
new Wizard(cfg).mount('#app');
</script>
<script>
window.I18N_EN_TITLE = "PRD Generator";
window.I18N_EN = {
  brand: "PRD Generator",
  back: "← Tools",
  th: "PRD Generator",
  badge: "skeleton",
  sub: "Based on the 9-chapter framework in PRD-writing-guide.md + language norms; style presets: Generic / Alibaba / Tencent.",
  foot: "© Yingyan Chen · skeleton build · checks from §3 of the PRD-writing guide"
};
</script>
<script src="assets/i18n.js"></script>
</body>
</html>
