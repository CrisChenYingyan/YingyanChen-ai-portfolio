<div class="tool-head"><div class="container">
  <h1>📋 <span data-i18n="th">访谈提纲 &amp; 问卷生成器</span> <span class="skeleton-badge" data-i18n="badge">骨架版</span></h1>
  <p data-i18n="sub">理论依据：Schwarz(1999) 措辞效应 · Tourangeau(2000) 四阶段认知模型 · Kvale(1996) 访谈七阶段（见《如何设计访问提纲or问卷.docx》）</p>
</div></div>
<main class="container"><div id="app"></div></main>
<footer><div class="container" data-i18n="foot">© 陈颖妍 · 骨架代码 · 逐题校验规则来自方法论文档</div></footer>

<script src="assets/wizard.js"></script>
<script>
/* 选项双语标签（v = 稳定键，用于存储/逻辑；zh/en = 显示） */
var T = {
  survey:{zh:'问卷',en:'Survey'}, interview:{zh:'访谈提纲',en:'Interview guide'},
  screen:{zh:'甄别/筛选题',en:'Screening'}, main:{zh:'主体题',en:'Main items'}, demo:{zh:'人口学信息',en:'Demographics'}, close:{zh:'结束语/邀约',en:'Closing / invite'},
  single:{zh:'单选',en:'Single choice'}, multi:{zh:'多选',en:'Multiple choice'}, likert:{zh:'Likert量表',en:'Likert scale'}, open:{zh:'开放题',en:'Open-ended'},
  warmup:{zh:'暖场/破冰',en:'Warm-up'}, bg:{zh:'背景与行为',en:'Background & behavior'}, core:{zh:'核心主题',en:'Core themes'}, probe:{zh:'关键追问',en:'Key probes'}, wrap:{zh:'收尾',en:'Wrap-up'},
  p1:{zh:'已找 3–5 人试答/试访',en:'Piloted with 3–5 people'}, p2:{zh:'已确认题目理解无歧义',en:'Confirmed items are unambiguous'}, p3:{zh:'已修订发现的问题',en:'Revised issues found'}
};
function o(v){ return {v:v, zh:T[v].zh, en:T[v].en}; }
function lbl(v,lang){ return T[v] ? (T[v][lang]||T[v].zh) : v; }

/* 校验规则（来自 如何设计…docx 第二部分 题项规范）——返回双语 msg */
function chkInduce(v){ if(!v)return null; if(/难道|不觉得|是不是很|您一定|大家都|众所周知/.test(v)) return {level:'warn',msg:{zh:'检测到可能的诱导性措辞（呼应 Schwarz：措辞会左右作答），建议改中性表述。',en:'Possible leading wording (cf. Schwarz: wording sways answers) — consider a neutral phrasing.'}}; return null; }
function chkDouble(v){ if(!v)return null; if(/(满意|喜欢|认可)[^。？\n]{0,12}(和|以及|与|且)[^。？\n]{0,12}(满意|喜欢|价格|服务|质量)/.test(v)) return {level:'tip',msg:{zh:'疑似“双重命题(double-barreled)”——一题问了两件事，建议拆成两题。',en:'Looks double-barreled — one item asks two things; consider splitting into two.'}}; return null; }
function chkNeg(v){ if(!v)return null; if(/不[^，。？\n]{0,6}不/.test(v)) return {level:'tip',msg:{zh:'疑似双重否定，改成正向表述更易理解。',en:'Looks like a double negative; a positive phrasing is easier to understand.'}}; return null; }

var cfg = {
  key:'survey', apiBase:'https://yingyan-chen-ai-portfolio.vercel.app',
  steps:[
    { title:{zh:'明确问题',en:'Define the question'}, intro:{zh:'第一步：想清楚这次研究要回答什么、给谁做决策用。（对应 Kvale 的 thematizing）',en:'Step 1: get clear on what this study answers and whose decision it serves (Kvale’s "thematizing").'},
      fields:[
        {name:'q', label:{zh:'研究问题',en:'Research question'}, hint:{zh:'一句话，尽量单一聚焦',en:'One sentence, keep it single-focused'}, type:'textarea', placeholder:{zh:'例：新用户为何在注册后 3 天内流失？',en:'e.g., Why do new users churn within 3 days of signing up?'},
          check:function(v){ if(v && v.length>60) return {level:'tip',msg:{zh:'问题偏长/可能过宽，考虑拆分为更聚焦的子问题。',en:'The question is long / possibly too broad — consider splitting into focused sub-questions.'}}; return null; }},
        {name:'decision', label:{zh:'这个结论将用于什么决策',en:'What decision will this conclusion inform'}, type:'text', placeholder:{zh:'例：优化注册引导流程',en:'e.g., improve the signup onboarding flow'}}
      ]},
    { title:{zh:'对象与体量',en:'Audience & scale'}, intro:{zh:'第二步：目标人群、样本量/访谈人数、预计时长。',en:'Step 2: target population, sample size / number of interviewees, expected duration.'},
      fields:[
        {name:'target', label:{zh:'目标人群',en:'Target population'}, type:'text', placeholder:{zh:'例：注册 7 天内流失的新用户',en:'e.g., new users who churn within 7 days of signup'}},
        {name:'size', label:{zh:'样本量 / 访谈人数',en:'Sample size / interviewees'}, type:'text', placeholder:{zh:'问卷≥一定量可统计；访谈 5–8 人起',en:'Surveys need enough for stats; interviews from 5–8 people'},
          check:function(v){ if(v && /^\d+$/.test(v) && +v<5) return {level:'tip',msg:{zh:'访谈样本偏少；可用性问题通常 5–8 人可覆盖大部分（腾讯用研经验）。',en:'Sample looks small; usability issues are usually mostly covered by 5–8 people (Tencent UXR practice).'}}; return null; }},
        {name:'dur', label:{zh:'预计时长',en:'Expected duration'}, type:'text', placeholder:{zh:'问卷 ≤5 分钟；访谈 30–60 分钟',en:'Survey ≤5 min; interview 30–60 min'}}
      ]},
    { title:{zh:'选产出物',en:'Choose the deliverable'}, intro:{zh:'第三步：要广度可推广→问卷（定量测态度）；要深层 Why→访谈（定性）。',en:'Step 3: breadth & generalizability → survey (quant attitudes); deep "why" → interview (qual).'},
      fields:[
        {name:'kind', label:{zh:'产出物类型',en:'Deliverable type'}, type:'radio', options:[o('survey'),o('interview')]}
      ]},
    { title:{zh:'结构与维度',en:'Structure & dimensions'}, intro:{zh:'第四步：选择要包含的模块 / 题型。',en:'Step 4: choose the modules / item types to include.'},
      fields:[
        {name:'modules', label:{zh:'问卷模块（问卷用）',en:'Survey modules (for surveys)'}, type:'checks', options:[o('screen'),o('main'),o('demo'),o('close')]},
        {name:'types', label:{zh:'题型（问卷用）',en:'Item types (for surveys)'}, type:'checks', options:[o('single'),o('multi'),o('likert'),o('open')]},
        {name:'imods', label:{zh:'访谈主题模块（提纲用）',en:'Interview theme modules (for guides)'}, type:'checks', options:[o('warmup'),o('bg'),o('core'),o('probe'),o('wrap')]}
      ]},
    { title:{zh:'逐题录入 + 校验',en:'Enter items + checks'}, intro:{zh:'第五步：每行一题。系统实时提示诱导性 / 双重命题 / 双重否定。',en:'Step 5: one item per line. Live flags for leading / double-barreled / double-negative wording.'},
      fields:[
        {name:'items', label:{zh:'题目（每行一题）',en:'Items (one per line)'}, type:'lines', placeholder:{zh:'请描述您上次注册时遇到的困难\n您对价格是否满意？',en:'Describe the difficulty you hit during your last signup\nAre you satisfied with the price?'},
          check:function(v){ if(!v)return null; var ls=v.split('\n'); for(var i=0;i<ls.length;i++){ var r=chkInduce(ls[i])||chkDouble(ls[i])||chkNeg(ls[i]); if(r){ return {level:r.level, msg:{zh:'第'+(i+1)+'题：'+r.msg.zh, en:'Q'+(i+1)+': '+r.msg.en}}; } } return {level:'ok',msg:{zh:'未检出常见表述问题（仍建议人工复核 + 认知预访）。',en:'No common wording issues detected (still review manually + run a cognitive pretest).'}}; }},
        {name:'openrule', label:{zh:'（访谈）追问预设',en:'(Interview) probe presets'}, hint:{zh:'为核心问题预设“为什么/举例/当时怎么想”',en:'Preset "why / example / what were you thinking" for core questions'}, type:'textarea', placeholder:{zh:'能不能举一个具体的例子？当时你是怎么想的？',en:'Can you give a concrete example? What were you thinking at the time?'}}
      ]},
    { title:{zh:'预览 + 导出',en:'Preview + export'}, intro:{zh:'第六步：正式发放前做“认知预访”（小样本出声思考，检验被试是否按你的意图理解）。',en:'Step 6: before full launch, run a "cognitive pretest" (small-sample think-aloud to check respondents interpret items as intended).'},
      fields:[
        {name:'pretest', label:{zh:'认知预访清单（勾选确认）',en:'Cognitive pretest checklist (tick to confirm)'}, type:'checks', options:[o('p1'),o('p2'),o('p3')]},
        {name:'_export', type:'static', html:{zh:'<div class="callout">右侧为实时预览。点“导出 .md”生成文件；后续可用 AI（配置 apiBase 后）做一键规范表述与批量出题草稿。</div>',en:'<div class="callout">Live preview on the right. Click "Export .md" to save; later, AI (once apiBase is configured) can standardize wording and draft items in bulk.</div>'}}
      ]}
  ],
  buildPreview:function(s,lang){
    var C = lang==='en'?': ':'：', DOT = lang==='en'?', ':'、';
    function P(zh,en){ return lang==='en'?en:zh; }
    var kindLabel = s.kind ? lbl(s.kind,lang) : P('问卷/访谈提纲','Survey / interview guide');
    var out=['# '+kindLabel+P('（草稿）',' (draft)'),''];
    if(s.q) out.push('**'+P('研究问题','Research question')+'**'+C+s.q);
    if(s.decision) out.push('**'+P('决策用途','Decision use')+'**'+C+s.decision);
    if(s.target) out.push('**'+P('对象','Audience')+'**'+C+s.target+(s.size?'（'+s.size+'）':'')+(s.dur?' · '+s.dur:''));
    out.push('');
    if(s.kind==='survey'){
      out.push('## '+P('结构','Structure')); (s.modules||[]).forEach(function(m){out.push('- '+lbl(m,lang));});
      if(s.types&&s.types.length) out.push('**'+P('题型','Item types')+'**'+C+s.types.map(function(t){return lbl(t,lang);}).join(DOT));
    } else if(s.kind==='interview'){
      out.push('## '+P('提纲结构','Guide structure')); (s.imods||[]).forEach(function(m){out.push('- '+lbl(m,lang));});
    }
    out.push('');
    if(s.items){ out.push('## '+P('题目','Items')); s.items.split('\n').forEach(function(q,i){ if(q.trim()) out.push((i+1)+'. '+q); }); }
    if(s.openrule){ out.push(''); out.push('**'+P('追问预设','Probe presets')+'**'+C+s.openrule); }
    if(s.pretest&&s.pretest.length){ out.push(''); out.push('**'+P('预访确认','Pretest confirmed')+'**'+C+s.pretest.map(function(x){return lbl(x,lang);}).join(DOT)); }
    return out.join('\n');
  }
};
new Wizard(cfg).mount('#app');
</script>
<script>
window.I18N_EN_TITLE = "Interview Guide & Survey Generator";
window.I18N_EN = {
  brand: "Interview Guide & Survey Generator",
  back: "← Tools",
  th: "Interview Guide & Survey Generator",
  badge: "skeleton",
  sub: "Theory: Schwarz (1999) wording effects · Tourangeau (2000) four-stage cognitive model · Kvale (1996) seven stages of interviewing.",
  foot: "© Yingyan Chen · skeleton build · per-item checks derived from the methodology docs"
};
</script>
